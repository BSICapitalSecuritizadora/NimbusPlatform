name: Deploy Laravel to Azure App Service

on:
  push:
    branches:
      - main  # Ou a sua branch principal (ex: master)
  workflow_dispatch:

jobs:
  build-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5' # Verifique a versão que você selecionou no Azure
          extensions: mbstring, bcmath, pdo_mysql, zip

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run build

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x ".git/*" "node_modules/*" "tests/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build-php
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bsicapital' # <--- SUBSTITUA PELO NOME DO SEU APP SERVICE
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
